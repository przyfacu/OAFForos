<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Foro y archivo de problemas para la comunidad olímpica de física argentina." />
    <title>OAFForos — Física olímpica, en comunidad</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Source+Serif+4:opsz,wght@8..60,500;8..60,600;8..60,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
    <link rel="stylesheet" href="css/styles.css" />
    <style>
      .notice { display: flex; align-items: center; gap: .75rem; padding: .7rem .8rem .7rem 1rem; }
      .notice.show { pointer-events: auto; }
      .notice-close { display: grid; place-items: center; width: 1.7rem; height: 1.7rem; padding: 0; border: 0; border-radius: 50%; background: transparent; color: inherit; cursor: pointer; font: 1.35rem/1 var(--sans); }
      .notice-close:hover, .notice-close:focus-visible { background: #ffffff24; }
      .notice-close:focus-visible { outline: 2px solid #fff; outline-offset: 2px; }
    </style>
  </head>
  <body>
    <a class="skip-link" href="#main">Saltar al contenido</a>
    <header class="site-header">
      <a href="#inicio" class="brand" aria-label="OAFForos, inicio"><span class="brand-mark">Ω</span><span>OAF<span>Foros</span></span></a>
      <nav aria-label="Navegación principal">
        <a href="#foro" data-route="foro">Foro</a>
        <a href="#archivo" data-route="archivo">Archivo</a>
        <a href="#acerca" data-route="acerca">Acerca de</a>
      </nav>
      <div class="header-actions">
        <button class="icon-button" id="search-toggle" aria-label="Buscar">⌕</button>
        <button class="button button-quiet" id="auth-button">Ingresar</button>
      </div>
    </header>
    <div id="notice" class="notice" role="status" aria-live="polite"></div>
    <main id="main" tabindex="-1"></main>
    <footer class="site-footer"><span>OAFForos · Comunidad de física olímpica</span><span>Beta pública</span></footer>
    <dialog id="modal" class="modal"></dialog>
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script type="module" src="js/app.js"></script>
  </body>
</html>
